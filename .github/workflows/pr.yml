name: Pr_build_pipeline
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  
jobs:
  pr_verify:
    name: Pr_verify
    runs-on: windows-latest
    steps:
      - name: check_out
        uses: actions/checkout@v6.0.2
      - name: download_sdk
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0
      - name: script
        shell: pwsh
        run: |
            echo "----- dotnet version----"
            dotnet --info
      - name: restore_pacakge
        shell: pwsh
        run: |
              pwd
              ls -lah
              write-host "restore packages"
              dotnet restore
              
        
    
